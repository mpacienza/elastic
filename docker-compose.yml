version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: elasticsearch-performance
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - elastic-performance-network
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: kibana-performance
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elastic-performance-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elastic-performance-api
    restart: unless-stopped
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ElasticsearchSettings__Uri=http://elasticsearch:9200
      - ElasticsearchSettings__IndexName=cuentas_bancarias
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elastic-performance-network

volumes:
  elasticsearch_data:
    driver: local

networks:
  elastic-performance-network:
    driver: bridge
